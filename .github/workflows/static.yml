# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate problem bank
        run: |
          node tools/validate_problems.js
          node tools/validate_training_packs.js
          node tools/validate_path_nodes.js
          node tools/validate_answer_checker.js
          node tools/validate_app_shell.js
          node tools/smoke_app_render.js
      - name: Assemble site
        # Deploy only the app shell — keep reports, tools, LaTeX sources,
        # and the workbook PDF (future paid product) off the public site.
        run: |
          mkdir -p _site
          cp index.html workbook.html styles.css sw.js manifest.webmanifest _site/
          cp -r assets src _site/
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
